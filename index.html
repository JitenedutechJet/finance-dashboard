<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>LUXURY FINANCE · family portfolio</title>
    <!-- Chart.js, jsPDF, SheetJS (XLSX) via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <!-- Font & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
        }
        
        body {
            background: linear-gradient(145deg, #f0f2fe 0%, #e9ebf5 100%);
            min-height: 100vh;
            padding: 1rem;
            transition: background 0.3s, color 0.2s;
        }
        
        body.dark {
            background: linear-gradient(145deg, #0b0e1a 0%, #1a1f2f 100%);
            color: #eef2fb;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 1.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), inset 0 1px 2px rgba(255, 255, 255, 0.6);
        }
        
        body.dark .glass {
            background: rgba(20, 25, 45, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.5);
        }
        
        .dashboard {
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }
        
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .logo h1 {
            font-weight: 600;
            font-size: clamp(1.5rem, 5vw, 1.9rem);
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #1e2b5e, #2a3f8a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        body.dark .logo h1 {
            background: linear-gradient(135deg, #b5c9ff, #d6e2ff);
            -webkit-background-clip: text;
        }
        
        .theme-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 3rem;
            padding: 0.5rem 1rem;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .theme-toggle:hover { 
            transform: scale(1.02); 
            background: rgba(255, 255, 255, 0.4); 
        }
        
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        @media (max-width: 900px) {
            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 500px) {
            .kpi-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .kpi-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            padding: 1.2rem 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: 0.15s;
        }
        
        body.dark .kpi-card {
            background: rgba(18, 22, 40, 0.5);
            border-color: rgba(255, 255, 255, 0.05);
        }
        
        .kpi-label { 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            opacity: 0.7; 
            margin-bottom: 0.25rem;
        }
        
        .kpi-value { 
            font-size: clamp(1.5rem, 4vw, 2.4rem); 
            font-weight: 600; 
            line-height: 1.2; 
            word-break: break-word;
        }
        
        .kpi-sub { 
            font-size: 0.8rem; 
            opacity: 0.6; 
        }
        
        .person-breakdown {
            font-size: 0.75rem;
            margin-top: 0.5rem;
            opacity: 0.8;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 0.5rem;
        }
        
        .form-panel {
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: flex-end;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            min-width: 130px;
            flex: 1 1 140px;
        }
        
        .input-group label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 4px;
            opacity: 0.7;
        }
        
        .input-group input, 
        .input-group select, 
        .input-group textarea {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 2rem;
            padding: 0.6rem 1rem;
            font-size: 0.9rem;
            outline: none;
            transition: 0.15s;
            color: #111;
            width: 100%;
        }
        
        body.dark .input-group input, 
        body.dark .input-group select, 
        body.dark .input-group textarea {
            background: rgba(15, 20, 35, 0.6);
            border-color: rgba(255, 255, 255, 0.1);
            color: #f0f3ff;
        }
        
        .input-group input:focus, 
        .input-group select:focus { 
            border-color: #4a5ec1; 
            box-shadow: 0 0 0 3px rgba(74, 94, 193, 0.2); 
        }
        
        .btn {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 2.5rem;
            padding: 0.6rem 1.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.12s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
            white-space: nowrap;
        }
        
        .btn-primary {
            background: #2a3f8a;
            border-color: #3a4fa0;
            color: white;
        }
        
        body.dark .btn-primary { 
            background: #344b9c; 
            color: white; 
        }
        
        .btn-danger {
            background: #b13e4b;
            border-color: #c05562;
            color: white;
        }
        
        body.dark .btn-danger {
            background: #aa3e4a;
        }
        
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 12px 20px -10px rgba(0, 0, 0, 0.2); 
        }
        
        .btn-primary:hover { 
            background: #1f3170; 
        }
        
        .btn-danger:hover {
            background: #922e39;
        }
        
        /* new top bar: only sort + export, search/date removed */
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
            align-items: center;
            justify-content: space-between;
        }
        
        .sort-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .sort-wrapper label {
            font-size: 0.75rem;
            font-weight: 600;
            opacity: 0.7;
            text-transform: uppercase;
        }
        
        .sort-wrapper select {
            background: rgba(255,255,255,0.5);
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 2rem;
            padding: 0.5rem 1.5rem 0.5rem 1rem;
            font-size: 0.9rem;
            outline: none;
            color: #111;
        }
        
        body.dark .sort-wrapper select {
            background: rgba(15,20,35,0.6);
            color: #f0f3ff;
            border-color: rgba(255,255,255,0.1);
        }
        
        .export-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .charts-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* only bar + pie */
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        @media (max-width: 900px) {
            .charts-row {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 600px) {
            .charts-row {
                grid-template-columns: 1fr;
            }
        }
        
        .chart-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(6px);
            border-radius: 1.5rem;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        body.dark .chart-card { 
            background: rgba(15, 20, 35, 0.3); 
        }
        
        .chart-container { 
            position: relative; 
            height: 180px; 
            width: 100%; 
        }
        
        canvas {
            max-height: 180px;
            width: 100% !important;
        }
        
        .table-wrapper {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 0.5rem;
            overflow-x: auto;
            margin-top: 1.5rem;
            -webkit-overflow-scrolling: touch;
            max-height: 500px;
            overflow-y: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        
        th { 
            text-align: left; 
            padding: 1rem 0.6rem 0.8rem; 
            opacity: 0.7; 
            font-weight: 500; 
            letter-spacing: 0.5px; 
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            z-index: 10;
        }
        
        body.dark th {
            background: rgba(20, 25, 45, 0.9);
        }
        
        td { 
            padding: 0.8rem 0.6rem; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.2); 
        }
        
        .entry-actions i { 
            margin: 0 5px; 
            cursor: pointer; 
            opacity: 0.6; 
            transition: 0.1s; 
            font-size: 1rem;
        }
        
        .entry-actions i:hover { 
            opacity: 1; 
            transform: scale(1.1); 
        }
        
        .income-badge { 
            color: #1f8540; 
            font-weight: 600; 
        }
        
        .expense-badge { 
            color: #b13e4b; 
            font-weight: 600; 
        }
        
        body.dark .income-badge { 
            color: #6fcf97; 
        }
        
        body.dark .expense-badge { 
            color: #ff7b7b; 
        }
        
        .toast-success {
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            left: 20px;
            background: #1a3b2e; 
            color: white; 
            padding: 0.8rem 1.5rem;
            border-radius: 3rem; 
            font-weight: 500; 
            box-shadow: 0 20px 35px -8px black;
            animation: slideIn 0.3s, fadeOut 0.5s 2.5s forwards;
            z-index: 999;
            max-width: 300px;
            margin: 0 auto;
            text-align: center;
        }
        
        @media (min-width: 768px) {
            .toast-success {
                left: auto;
                right: 25px;
            }
        }
        
        @keyframes slideIn { 
            from {transform: translateX(100%); opacity: 0;} 
            to {transform: translateX(0); opacity: 1;} 
        }
        
        @keyframes fadeOut { 
            to {opacity: 0; transform: translateX(20px);} 
        }
        
        #emptyPlaceholder {
            padding: 2rem 1rem;
            text-align: center;
            opacity: 0.5;
            font-size: 0.95rem;
        }
        
        @media (hover: none) and (pointer: coarse) {
            .btn, .theme-toggle, .entry-actions i {
                padding: 0.8rem 1.5rem;
            }
            
            .entry-actions i {
                padding: 0.5rem;
            }
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem;
            flex-wrap: wrap;
        }
        
        .pagination button {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 2rem;
            padding: 0.4rem 1rem;
            cursor: pointer;
            transition: 0.1s;
            min-width: 40px;
        }
        
        .pagination button:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.8);
        }
        
        .pagination button.active {
            background: #2a3f8a;
            color: white;
            border-color: #2a3f8a;
        }
        
        .pagination button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="header-row">
        <div class="logo"><h1><i class="fas fa-chart-pie" style="margin-right: 8px;"></i>Expense Tracker-Mohith</h1></div>
        <div class="theme-toggle" id="darkmodeToggle"><i class="fas fa-moon"></i> <span style="font-size: 0.8rem;">LUX</span></div>
    </div>
    
    <div class="kpi-grid" id="kpiPanel">
        <div class="kpi-card"><div class="kpi-label">Total Income</div><div class="kpi-value" id="totalIncome">₹ 0</div></div>
        <div class="kpi-card"><div class="kpi-label">Total Expense</div><div class="kpi-value" id="totalExpense">₹ 0</div></div>
        <div class="kpi-card"><div class="kpi-label">Net Balance</div><div class="kpi-value" id="netBalance">₹ 0</div></div>
        <div class="kpi-card"><div class="kpi-label">Monthly summary</div><div class="kpi-value" id="monthlySummary">₹ 0</div><div class="kpi-sub">current month</div></div>
    </div>

    <div class="glass form-panel" id="entryForm">
        <div class="input-group"><label>type</label><select id="entryType"><option value="income">💰 Income</option><option value="expense">💸 Expense</option></select></div>
        <div class="input-group"><label>amount (₹)</label><input type="number" id="amount" placeholder="0.00" step="0.01" min="0" inputmode="decimal"></div>
        <div class="input-group"><label>category</label><select id="category"><option value="Salary">Salary</option><option value="Food">Food</option><option value="Transport">Transport</option><option value="Shopping">Shopping</option><option value="Entertainment">Entertainment</option><option value="Bills">Bills</option><option value="Other">Other</option></select></div>
        <div class="input-group"><label>person</label><select id="personSelect"><option value="Self">Self</option><option value="Father">Father</option><option value="Mother">Mother</option><option value="Brother">Brother</option></select></div>
        <div class="input-group"><label>date</label><input type="date" id="entryDate"></div>
        <div class="input-group"><label>note</label><textarea id="note" rows="1" placeholder="note..."></textarea></div>
        <button class="btn btn-primary" id="addBtn"><i class="fas fa-plus-circle"></i> Add</button>
        <button class="btn btn-danger" id="clearDataBtn"><i class="fas fa-trash-alt"></i> Clear data</button>
    </div>

    <!-- new simplified top bar: only sort + export buttons (search/date removed) -->
    <div class="action-bar">
        <div class="sort-wrapper">
            <label for="sortSelect"><i class="fas fa-sort"></i> Sort by</label>
            <select id="sortSelect">
                <option value="date-desc">Date (newest first)</option>
                <option value="date-asc">Date (oldest first)</option>
                <option value="amount-desc">Amount (high to low)</option>
                <option value="amount-asc">Amount (low to high)</option>
            </select>
        </div>
        <div class="export-buttons">
            <button class="btn" id="exportPdf"><i class="fas fa-file-pdf"></i> PDF</button>
            <button class="btn" id="exportExcel"><i class="fas fa-file-excel"></i> Excel</button>
        </div>
    </div>

    <div class="charts-row">
        <div class="chart-card"><canvas id="barChart"></canvas></div>
        <div class="chart-card"><canvas id="pieChart"></canvas></div>
    </div>

    <div class="table-wrapper glass" id="tableWrapper">
        <table id="entryTable">
            <thead><tr><th>Type</th><th>Amount</th><th>Category</th><th>Person</th><th>Date</th><th>Note</th><th style="width:50px;">Action</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
        <div id="emptyPlaceholder" style="display: none;">No transactions — add one above</div>
    </div>
    <div class="pagination" id="pagination"></div>
</div>

<script>
(function() {
    'use strict';

    // ==================== PRODUCTION FINANCE MODULE ====================
    // No search/date filters, only sort above table.
    // PDF and Excel exports generate actual downloadable files with all transactions.
    
    // --------------------------------------------------------------------
    // Color Generator 
    // --------------------------------------------------------------------
    const ColorGenerator = {
        cache: new Map(),
        hue: 0.7,
        
        getColor: function(key) {
            if (!this.cache.has(key)) {
                this.hue = (this.hue + 0.618033988749895) % 1;
                this.cache.set(key, `hsl(${this.hue * 360}, 70%, 60%)`);
            }
            return this.cache.get(key);
        },
        
        reset: function() {
            this.cache.clear();
            this.hue = 0.7;
        }
    };

    // --------------------------------------------------------------------
    // Data Store
    // --------------------------------------------------------------------
    const DataStore = (function() {
        let transactions = [];
        let nextId = 1;
        
        const load = () => {
            try {
                const stored = localStorage.getItem('finance_production');
                if (stored) {
                    const data = JSON.parse(stored);
                    transactions = data.transactions || [];
                    nextId = data.nextId || 1;
                    transactions.forEach(t => {
                        if (!t.ts) t.ts = new Date(t.date).getTime();
                    });
                } else {
                    transactions = [];
                    nextId = 1;
                }
            } catch (e) {
                transactions = [];
                nextId = 1;
            }
        };
        
        const save = () => {
            try {
                localStorage.setItem('finance_production', JSON.stringify({ transactions, nextId }));
                return true;
            } catch (e) {
                alert('Storage limit reached. Please export and clear data.');
                return false;
            }
        };
        
        const clearAll = () => {
            transactions = [];
            nextId = 1;
            save();
        };
        
        return {
            init: load,
            getAll: () => transactions,
            getCount: () => transactions.length,
            add: (tx) => {
                tx.id = nextId++;
                tx.ts = new Date(tx.date).getTime();
                transactions.push(tx);
                save();
                return tx;
            },
            delete: (id) => {
                const idx = transactions.findIndex(t => t.id === id);
                if (idx === -1) return false;
                transactions.splice(idx, 1);
                save();
                return true;
            },
            clearAll,
            // filter: only sort applied (no search/date)
            query: (sortOption, page = 1, pageSize = 30) => {
                let filtered = [...transactions]; // copy
                
                // sorting
                if (sortOption === 'date-desc') {
                    filtered.sort((a, b) => b.ts - a.ts);
                } else if (sortOption === 'date-asc') {
                    filtered.sort((a, b) => a.ts - b.ts);
                } else if (sortOption === 'amount-desc') {
                    filtered.sort((a, b) => b.a - a.a);
                } else if (sortOption === 'amount-asc') {
                    filtered.sort((a, b) => a.a - b.a);
                }
                
                const total = filtered.length;
                const start = (page - 1) * pageSize;
                const paginated = filtered.slice(start, start + pageSize);
                
                return {
                    data: paginated,
                    total: total,
                    page: page,
                    pageSize: pageSize,
                    totalPages: Math.ceil(total / pageSize)
                };
            },
            // for KPI and charts: we need all data (no filter)
            getAllSorted: (sortOption) => {
                let all = [...transactions];
                if (sortOption === 'date-desc') all.sort((a, b) => b.ts - a.ts);
                else if (sortOption === 'date-asc') all.sort((a, b) => a.ts - b.ts);
                else if (sortOption === 'amount-desc') all.sort((a, b) => b.a - a.a);
                else if (sortOption === 'amount-asc') all.sort((a, b) => a.a - b.a);
                return all;
            },
            calculateKPIs: (data) => {
                let totalIncome = 0, totalExpense = 0;
                const now = new Date();
                const currentMonth = now.getMonth(), currentYear = now.getFullYear();
                let monthIncome = 0, monthExpense = 0;
                const personExpenses = {};
                
                for (let t of data) {
                    if (t.ty === 'income') {
                        totalIncome += t.a;
                        const d = new Date(t.ts);
                        if (d.getMonth() === currentMonth && d.getFullYear() === currentYear) monthIncome += t.a;
                    } else {
                        totalExpense += t.a;
                        const d = new Date(t.ts);
                        if (d.getMonth() === currentMonth && d.getFullYear() === currentYear) monthExpense += t.a;
                        const person = t.p || 'Self';
                        personExpenses[person] = (personExpenses[person] || 0) + t.a;
                    }
                }
                return {
                    totalIncome, totalExpense, balance: totalIncome - totalExpense,
                    monthIncome, monthExpense, monthBalance: monthIncome - monthExpense,
                    personExpenses
                };
            },
            getCategoryTotals: (data) => {
                const cat = {};
                for (let t of data) if (t.ty === 'expense') cat[t.c] = (cat[t.c] || 0) + t.a;
                return cat;
            },
            getMonthlyAggregates: (data) => {
                const oneYearAgo = Date.now() - 365*86400000;
                const monthly = {};
                for (let t of data) {
                    if (t.ts >= oneYearAgo) {
                        const d = new Date(t.ts);
                        const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
                        if (!monthly[key]) monthly[key] = { i:0, e:0 };
                        if (t.ty === 'income') monthly[key].i += t.a;
                        else monthly[key].e += t.a;
                    }
                }
                return monthly;
            }
        };
    })();

    // --------------------------------------------------------------------
    // UI Manager
    // --------------------------------------------------------------------
    const UIManager = (function() {
        const elements = {
            totalIncome: document.getElementById('totalIncome'),
            totalExpense: document.getElementById('totalExpense'),
            netBalance: document.getElementById('netBalance'),
            monthlySummary: document.getElementById('monthlySummary'),
            tableBody: document.getElementById('tableBody'),
            emptyPlaceholder: document.getElementById('emptyPlaceholder'),
            addBtn: document.getElementById('addBtn'),
            clearDataBtn: document.getElementById('clearDataBtn'),
            entryType: document.getElementById('entryType'),
            amount: document.getElementById('amount'),
            category: document.getElementById('category'),
            personSelect: document.getElementById('personSelect'),
            entryDate: document.getElementById('entryDate'),
            note: document.getElementById('note'),
            sortSelect: document.getElementById('sortSelect'),
            pagination: document.getElementById('pagination')
        };
        
        let currentPage = 1;
        const pageSize = 30;
        
        elements.entryDate.value = new Date().toISOString().split('T')[0];
        
        const formatINR = (num) => '₹ ' + num.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
        
        const showToast = (msg) => {
            const toast = document.createElement('div');
            toast.className = 'toast-success';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        };
        
        const resetForm = () => {
            elements.entryType.value = 'income';
            elements.amount.value = '';
            elements.category.value = 'Salary';
            elements.personSelect.value = 'Self';
            elements.entryDate.value = new Date().toISOString().split('T')[0];
            elements.note.value = '';
        };
        
        const updateKPI = (kpis) => {
            elements.totalIncome.innerText = formatINR(kpis.totalIncome);
            elements.totalExpense.innerText = formatINR(kpis.totalExpense);
            elements.monthlySummary.innerText = formatINR(kpis.monthBalance);
            
            let personHtml = '<div class="person-breakdown">';
            const persons = kpis.personExpenses;
            if (Object.keys(persons).length) {
                for (let [person, amt] of Object.entries(persons)) personHtml += `<div>${person}: ${formatINR(amt)}</div>`;
            } else personHtml += '<div>No expenses</div>';
            personHtml += '</div>';
            elements.netBalance.innerHTML = formatINR(kpis.balance) + personHtml;
        };
        
        const renderTable = (result) => {
            if (result.total === 0) {
                elements.tableBody.innerHTML = '';
                elements.emptyPlaceholder.style.display = 'block';
                elements.pagination.innerHTML = '';
                return;
            }
            elements.emptyPlaceholder.style.display = 'none';
            
            let html = '';
            for (let t of result.data) {
                const typeClass = t.ty === 'income' ? 'income-badge' : 'expense-badge';
                const sign = t.ty === 'income' ? '' : '-';
                html += `<tr>
                    <td class="${typeClass}">${t.ty}</td>
                    <td>${sign}${formatINR(t.a)}</td>
                    <td>${t.c}</td>
                    <td>${t.p || 'Self'}</td>
                    <td>${t.date}</td>
                    <td>${t.n || ''}</td>
                    <td class="entry-actions"><i class="fas fa-trash-alt" data-id="${t.id}" style="color:#b13e4b;" title="Delete"></i></td>
                </tr>`;
            }
            elements.tableBody.innerHTML = html;
            
            if (result.totalPages > 1) {
                let p = '';
                p += `<button ${result.page===1?'disabled':''} data-page="1">«</button>`;
                p += `<button ${result.page===1?'disabled':''} data-page="${result.page-1}">‹</button>`;
                let start = Math.max(1, result.page-2), end = Math.min(result.totalPages, result.page+2);
                for (let i=start; i<=end; i++) p += `<button class="${i===result.page?'active':''}" data-page="${i}">${i}</button>`;
                p += `<button ${result.page===result.totalPages?'disabled':''} data-page="${result.page+1}">›</button>`;
                p += `<button ${result.page===result.totalPages?'disabled':''} data-page="${result.totalPages}">»</button>`;
                elements.pagination.innerHTML = p;
            } else elements.pagination.innerHTML = '';
        };
        
        const getCurrentSort = () => elements.sortSelect.value;
        
        return {
            elements,
            formatINR,
            showToast,
            resetForm,
            updateKPI,
            renderTable,
            getCurrentSort,
            currentPage: () => currentPage,
            setPage: (p) => { currentPage = p; }
        };
    })();

    // --------------------------------------------------------------------
    // Chart Manager
    // --------------------------------------------------------------------
    const ChartManager = (function() {
        let barChart = null, pieChart = null;
        const barCanvas = document.getElementById('barChart');
        const pieCanvas = document.getElementById('pieChart');
        
        const update = (allData) => {
            // bar
            if (barCanvas) {
                const monthly = DataStore.getMonthlyAggregates(allData);
                const sorted = Object.keys(monthly).sort().slice(-12);
                const labels = sorted.map(m => { let [y,mo]=m.split('-'); return mo+'/'+y.slice(2); });
                const income = sorted.map(m => monthly[m].i||0);
                const expense = sorted.map(m => monthly[m].e||0);
                
                if (barChart) {
                    barChart.data.labels = labels;
                    barChart.data.datasets[0].data = income;
                    barChart.data.datasets[1].data = expense;
                    barChart.update('none');
                } else {
                    barChart = new Chart(barCanvas, {
                        type: 'bar',
                        data: {
                            labels,
                            datasets: [
                                { label:'Income', data:income, backgroundColor:'#2a3f8a', borderRadius:6 },
                                { label:'Expense', data:expense, backgroundColor:'#b13e4b', borderRadius:6 }
                            ]
                        },
                        options: { responsive:true, maintainAspectRatio:false, animation:false, plugins:{ legend:{ display:false } } }
                    });
                }
            }
            // pie
            if (pieCanvas) {
                const categories = DataStore.getCategoryTotals(allData);
                const labels = Object.keys(categories);
                const data = Object.values(categories);
                ColorGenerator.reset();
                const colors = labels.map(l => ColorGenerator.getColor(l));
                
                if (pieChart) {
                    pieChart.data.labels = labels;
                    pieChart.data.datasets[0].data = data;
                    pieChart.data.datasets[0].backgroundColor = colors;
                    pieChart.update('none');
                } else {
                    pieChart = new Chart(pieCanvas, {
                        type: 'pie',
                        data: {
                            labels,
                            datasets: [{ data, backgroundColor:colors, borderWidth:0 }]
                        },
                        options: { responsive:true, maintainAspectRatio:false, animation:false, plugins:{ legend:{ position:'bottom' } } }
                    });
                }
            }
        };
        return { update };
    })();

    // --------------------------------------------------------------------
    // Export functions (real PDF / Excel)
    // --------------------------------------------------------------------
    function exportToPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const all = DataStore.getAll();
        
        doc.setFontSize(16);
        doc.text('Family Finance Report', 14, 20);
        doc.setFontSize(10);
        doc.text(`Generated: ${new Date().toLocaleString()}`, 14, 28);
        doc.text(`Total transactions: ${all.length}`, 14, 34);
        
        let y = 44;
        doc.setFontSize(8);
        doc.text('Type', 14, y);
        doc.text('Amount', 40, y);
        doc.text('Category', 70, y);
        doc.text('Person', 100, y);
        doc.text('Date', 130, y);
        doc.text('Note', 160, y);
        y += 6;
        
        for (let t of all.slice(0, 100)) { // limit to 100 for PDF size
            if (y > 280) { doc.addPage(); y = 20; }
            doc.text(t.ty, 14, y);
            doc.text(UIManager.formatINR(t.a), 40, y);
            doc.text(t.c, 70, y);
            doc.text(t.p||'Self', 100, y);
            doc.text(t.date, 130, y);
            let note = t.n || '';
            if (note.length > 15) note = note.substring(0,12)+'...';
            doc.text(note, 160, y);
            y += 5;
        }
        doc.save('finance_report.pdf');
        UIManager.showToast('PDF downloaded');
    }

    function exportToExcel() {
        const all = DataStore.getAll();
        const rows = all.map(t => ({
            Type: t.ty,
            Amount: t.a,
            Category: t.c,
            Person: t.p || 'Self',
            Date: t.date,
            Note: t.n || ''
        }));
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.json_to_sheet(rows);
        XLSX.utils.book_append_sheet(wb, ws, 'Transactions');
        XLSX.writeFile(wb, 'finance_export.xlsx');
        UIManager.showToast('Excel downloaded');
    }

    // --------------------------------------------------------------------
    // App Controller
    // --------------------------------------------------------------------
    const App = (function() {
        const refresh = (page = UIManager.currentPage()) => {
            const sort = UIManager.getCurrentSort();
            const result = DataStore.query(sort, page, 30);
            UIManager.renderTable(result);
            
            const allData = DataStore.getAllSorted(sort); // all for KPI/charts
            const kpis = DataStore.calculateKPIs(allData);
            UIManager.updateKPI(kpis);
            ChartManager.update(allData);
        };
        
        const handleAdd = () => {
            const amount = parseFloat(UIManager.elements.amount.value);
            if (!amount || amount<=0) return alert('Positive amount required');
            DataStore.add({
                ty: UIManager.elements.entryType.value,
                a: amount,
                c: UIManager.elements.category.value,
                p: UIManager.elements.personSelect.value,
                date: UIManager.elements.entryDate.value,
                n: UIManager.elements.note.value
            });
            UIManager.showToast('Entry added');
            UIManager.resetForm();
            UIManager.setPage(1);
            refresh(1);
        };
        
        const handleDelete = (id) => {
            if (confirm('Delete transaction?')) {
                DataStore.delete(id);
                UIManager.showToast('Deleted');
                refresh(UIManager.currentPage());
            }
        };
        
        const handleClearAll = () => {
            if (confirm('⚠️ Delete ALL transactions? Cannot undo.')) {
                DataStore.clearAll();
                UIManager.showToast('All data cleared');
                UIManager.setPage(1);
                refresh(1);
            }
        };
        
        const init = () => {
            DataStore.init();
            // no sample data
            UIManager.elements.addBtn.addEventListener('click', handleAdd);
            UIManager.elements.clearDataBtn.addEventListener('click', handleClearAll);
            UIManager.elements.sortSelect.addEventListener('change', () => {
                UIManager.setPage(1);
                refresh(1);
            });
            
            UIManager.elements.tableBody.addEventListener('click', (e) => {
                if (e.target.classList.contains('fa-trash-alt')) {
                    handleDelete(parseInt(e.target.dataset.id));
                }
            });
            
            UIManager.elements.pagination.addEventListener('click', (e) => {
                if (e.target.tagName==='BUTTON' && e.target.dataset.page && !e.target.disabled) {
                    UIManager.setPage(parseInt(e.target.dataset.page));
                    refresh(UIManager.currentPage());
                }
            });
            
            document.getElementById('exportPdf').addEventListener('click', exportToPDF);
            document.getElementById('exportExcel').addEventListener('click', exportToExcel);
            
            document.getElementById('darkmodeToggle').addEventListener('click', () => {
                document.body.classList.toggle('dark');
                const toggle = document.getElementById('darkmodeToggle');
                toggle.innerHTML = document.body.classList.contains('dark') ? 
                    '<i class="fas fa-sun"></i> LIGHT' : '<i class="fas fa-moon"></i> LUX';
            });
            
            refresh(1);
        };
        
        return { init };
    })();

    App.init();
})();
</script>
</body>
</html>
