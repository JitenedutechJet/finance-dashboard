<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>LUXURY FINANCE | family portfolio</title>
    <!-- Chart.js, jsPDF, SheetJS (XLSX) via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <!-- Font & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
        }
        
        body {
            background: linear-gradient(145deg, #f0f2fe 0%, #e9ebf5 100%);
            min-height: 100vh;
            padding: 1rem;
            transition: background 0.3s, color 0.2s;
        }
        
        body.dark {
            background: linear-gradient(145deg, #0b0e1a 0%, #1a1f2f 100%);
            color: #eef2fb;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 1.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), inset 0 1px 2px rgba(255, 255, 255, 0.6);
        }
        
        body.dark .glass {
            background: rgba(20, 25, 45, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.5);
        }
        
        .dashboard {
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }
        
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .logo h1 {
            font-weight: 600;
            font-size: clamp(1.5rem, 5vw, 1.9rem);
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #1e2b5e, #2a3f8a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        body.dark .logo h1 {
            background: linear-gradient(135deg, #b5c9ff, #d6e2ff);
            -webkit-background-clip: text;
        }
        
        .theme-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 3rem;
            padding: 0.5rem 1rem;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .theme-toggle:hover { 
            transform: scale(1.02); 
            background: rgba(255, 255, 255, 0.4); 
        }
        
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        @media (max-width: 900px) {
            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 500px) {
            .kpi-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .kpi-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            padding: 1.2rem 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: 0.15s;
        }
        
        body.dark .kpi-card {
            background: rgba(18, 22, 40, 0.5);
            border-color: rgba(255, 255, 255, 0.05);
        }
        
        .kpi-label { 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            opacity: 0.7; 
            margin-bottom: 0.25rem;
        }
        
        .kpi-value { 
            font-size: clamp(1.5rem, 4vw, 2.4rem); 
            font-weight: 600; 
            line-height: 1.2; 
            word-break: break-word;
        }
        
        .kpi-sub { 
            font-size: 0.8rem; 
            opacity: 0.6; 
        }
        
        .person-breakdown {
            font-size: 0.75rem;
            margin-top: 0.5rem;
            opacity: 0.8;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 0.5rem;
        }
        
        .form-panel {
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: flex-end;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            min-width: 130px;
            flex: 1 1 140px;
        }
        
        .input-group label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 4px;
            opacity: 0.7;
        }
        
        .input-group input, 
        .input-group select, 
        .input-group textarea {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 2rem;
            padding: 0.6rem 1rem;
            font-size: 0.9rem;
            outline: none;
            transition: 0.15s;
            color: #111;
            width: 100%;
        }
        
        body.dark .input-group input, 
        body.dark .input-group select, 
        body.dark .input-group textarea {
            background: rgba(15, 20, 35, 0.6);
            border-color: rgba(255, 255, 255, 0.1);
            color: #f0f3ff;
        }
        
        .input-group input:focus, 
        .input-group select:focus { 
            border-color: #4a5ec1; 
            box-shadow: 0 0 0 3px rgba(74, 94, 193, 0.2); 
        }
        
        .btn {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 2.5rem;
            padding: 0.6rem 1.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.12s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
            white-space: nowrap;
        }
        
        .btn-primary {
            background: #2a3f8a;
            border-color: #3a4fa0;
            color: white;
        }
        
        body.dark .btn-primary { 
            background: #344b9c; 
            color: white; 
        }
        
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 12px 20px -10px rgba(0, 0, 0, 0.2); 
        }
        
        .btn-primary:hover { 
            background: #1f3170; 
        }
        
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            align-items: center;
        }
        
        .search-box { 
            flex: 2; 
            min-width: 200px; 
        }
        
        .date-range { 
            display: flex; 
            gap: 0.5rem; 
            flex-wrap: wrap; 
            flex: 1;
            min-width: 250px;
        }
        
        .date-range .input-group {
            min-width: 120px;
        }
        
        .sort-select { 
            min-width: 150px; 
            flex: 1;
        }
        
        .export-buttons {
            display: flex;
            gap: 0.5rem;
            margin-left: auto;
            flex-wrap: wrap;
        }
        
        @media (max-width: 700px) {
            .export-buttons {
                margin-left: 0;
                width: 100%;
                justify-content: flex-end;
            }
        }
        
        .charts-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        @media (max-width: 900px) {
            .charts-row {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 600px) {
            .charts-row {
                grid-template-columns: 1fr;
            }
        }
        
        .chart-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(6px);
            border-radius: 1.5rem;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        body.dark .chart-card { 
            background: rgba(15, 20, 35, 0.3); 
        }
        
        .chart-container { 
            position: relative; 
            height: 180px; 
            width: 100%; 
        }
        
        canvas {
            max-height: 180px;
            width: 100% !important;
        }
        
        .table-wrapper {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 0.5rem;
            overflow-x: auto;
            margin-top: 1.5rem;
            -webkit-overflow-scrolling: touch;
            max-height: 500px;
            overflow-y: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        
        th { 
            text-align: left; 
            padding: 1rem 0.6rem 0.8rem; 
            opacity: 0.7; 
            font-weight: 500; 
            letter-spacing: 0.5px; 
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            z-index: 10;
        }
        
        body.dark th {
            background: rgba(20, 25, 45, 0.9);
        }
        
        td { 
            padding: 0.8rem 0.6rem; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.2); 
        }
        
        .entry-actions i { 
            margin: 0 5px; 
            cursor: pointer; 
            opacity: 0.6; 
            transition: 0.1s; 
            font-size: 1rem;
        }
        
        .entry-actions i:hover { 
            opacity: 1; 
            transform: scale(1.1); 
        }
        
        .income-badge { 
            color: #1f8540; 
            font-weight: 600; 
        }
        
        .expense-badge { 
            color: #b13e4b; 
            font-weight: 600; 
        }
        
        body.dark .income-badge { 
            color: #6fcf97; 
        }
        
        body.dark .expense-badge { 
            color: #ff7b7b; 
        }
        
        .toast-success {
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            left: 20px;
            background: #1a3b2e; 
            color: white; 
            padding: 0.8rem 1.5rem;
            border-radius: 3rem; 
            font-weight: 500; 
            box-shadow: 0 20px 35px -8px black;
            animation: slideIn 0.3s, fadeOut 0.5s 2.5s forwards;
            z-index: 999;
            max-width: 300px;
            margin: 0 auto;
            text-align: center;
        }
        
        @media (min-width: 768px) {
            .toast-success {
                left: auto;
                right: 25px;
            }
        }
        
        @keyframes slideIn { 
            from {transform: translateX(100%); opacity: 0;} 
            to {transform: translateX(0); opacity: 1;} 
        }
        
        @keyframes fadeOut { 
            to {opacity: 0; transform: translateX(20px);} 
        }
        
        #emptyPlaceholder {
            padding: 2rem 1rem;
            text-align: center;
            opacity: 0.5;
            font-size: 0.95rem;
        }
        
        @media (hover: none) and (pointer: coarse) {
            .btn, .theme-toggle, .entry-actions i {
                padding: 0.8rem 1.5rem;
            }
            
            .entry-actions i {
                padding: 0.5rem;
            }
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem;
            flex-wrap: wrap;
        }
        
        .pagination button {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 2rem;
            padding: 0.4rem 1rem;
            cursor: pointer;
            transition: 0.1s;
            min-width: 40px;
        }
        
        .pagination button:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.8);
        }
        
        .pagination button.active {
            background: #2a3f8a;
            color: white;
            border-color: #2a3f8a;
        }
        
        .pagination button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="header-row">
        <div class="logo"><h1><i class="fas fa-chart-pie" style="margin-right: 8px;"></i>Expense Tracker-Mohith</h1></div>
        <div class="theme-toggle" id="darkmodeToggle"><i class="fas fa-moon"></i> <span style="font-size: 0.8rem;">LUX</span></div>
    </div>
    
    <div class="kpi-grid" id="kpiPanel">
        <div class="kpi-card"><div class="kpi-label">Total Income</div><div class="kpi-value" id="totalIncome">₹ 0</div></div>
        <div class="kpi-card"><div class="kpi-label">Total Expense</div><div class="kpi-value" id="totalExpense">₹ 0</div></div>
        <div class="kpi-card"><div class="kpi-label">Net Balance</div><div class="kpi-value" id="netBalance">₹ 0</div></div>
        <div class="kpi-card"><div class="kpi-label">Monthly summary</div><div class="kpi-value" id="monthlySummary">₹ 0</div><div class="kpi-sub">current month</div></div>
    </div>

    <div class="glass form-panel" id="entryForm">
        <div class="input-group"><label>type</label><select id="entryType"><option value="income">💰 Income</option><option value="expense">💸 Expense</option></select></div>
        <div class="input-group"><label>amount (₹)</label><input type="number" id="amount" placeholder="0.00" step="0.01" min="0" inputmode="decimal"></div>
        <div class="input-group"><label>category</label><select id="category"><option value="Salary">Salary</option><option value="Food">Food</option><option value="Transport">Transport</option><option value="Shopping">Shopping</option><option value="Entertainment">Entertainment</option><option value="Bills">Bills</option><option value="Other">Other</option></select></div>
        <div class="input-group"><label>person</label><select id="personSelect"><option value="Self">Self</option><option value="Father">Father</option><option value="Mother">Mother</option><option value="Brother">Brother</option></select></div>
        <div class="input-group"><label>date</label><input type="date" id="entryDate"></div>
        <div class="input-group"><label>note</label><textarea id="note" rows="1" placeholder="note..."></textarea></div>
        <button class="btn btn-primary" id="addBtn"><i class="fas fa-plus-circle"></i> Add</button>
    </div>

    <div class="filter-bar">
        <div class="input-group search-box"><label>search</label><input type="text" id="searchInput" placeholder="note, category, person..."></div>
        <div class="date-range">
            <div class="input-group"><label>from</label><input type="date" id="dateFrom"></div>
            <div class="input-group"><label>to</label><input type="date" id="dateTo"></div>
        </div>
        <div class="input-group sort-select"><label>sort</label><select id="sortSelect"><option value="date-desc">date (newest)</option><option value="date-asc">date (oldest)</option><option value="amount-desc">amount high</option><option value="amount-asc">amount low</option></select></div>
        <div class="export-buttons">
            <button class="btn" id="exportPdf"><i class="fas fa-file-pdf"></i> PDF</button>
            <button class="btn" id="exportExcel"><i class="fas fa-file-excel"></i> Excel</button>
        </div>
    </div>

    <div class="charts-row">
        <div class="chart-card"><canvas id="barChart"></canvas></div>
        <div class="chart-card"><canvas id="pieChart"></canvas></div>
        <div class="chart-card"><canvas id="lineChart"></canvas></div>
    </div>

    <div class="table-wrapper glass" id="tableWrapper">
        <table id="entryTable">
            <thead><tr><th>Type</th><th>Amount</th><th>Category</th><th>Person</th><th>Date</th><th>Note</th><th style="width:50px;">Action</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
        <div id="emptyPlaceholder" style="display: none;">No transactions — add one above</div>
    </div>
    <div class="pagination" id="pagination"></div>
</div>

<script>
(function() {
    'use strict';

    // ==================== STABLE PRODUCTION FINANCE MODULE ====================
    // No edit functionality - only Add + Delete
    // Optimized for 30,000+ transactions
    // Perfect pie chart with all categories
    
    // ------------------------------------------------------------------------
    // Color Generator with Persistent Cache
    // ------------------------------------------------------------------------
    const ColorGenerator = {
        cache: new Map(),
        hue: 0.7,
        
        getColor: function(key) {
            if (!this.cache.has(key)) {
                this.hue = (this.hue + 0.618033988749895) % 1;
                this.cache.set(key, `hsl(${this.hue * 360}, 70%, 60%)`);
            }
            return this.cache.get(key);
        },
        
        reset: function() {
            this.cache.clear();
            this.hue = 0.7;
        }
    };

    // ------------------------------------------------------------------------
    // Data Store - Simple, Fast, Reliable
    // ------------------------------------------------------------------------
    const DataStore = (function() {
        let transactions = [];
        let nextId = 1;
        
        // Load from localStorage
        const load = () => {
            try {
                const stored = localStorage.getItem('finance_production');
                if (stored) {
                    const data = JSON.parse(stored);
                    transactions = data.transactions || [];
                    nextId = data.nextId || 1;
                    
                    // Ensure all transactions have timestamps
                    transactions.forEach(t => {
                        if (!t.ts) {
                            t.ts = new Date(t.date).getTime();
                        }
                    });
                } else {
                    transactions = [];
                    nextId = 1;
                }
            } catch (e) {
                console.error('Error loading:', e);
                transactions = [];
                nextId = 1;
            }
        };
        
        // Save to localStorage
        const save = () => {
            try {
                const data = {
                    transactions: transactions,
                    nextId: nextId
                };
                localStorage.setItem('finance_production', JSON.stringify(data));
                return true;
            } catch (e) {
                console.error('Save failed:', e);
                alert('Storage limit reached. Please export and clear data.');
                return false;
            }
        };
        
        // Public API
        return {
            init: load,
            
            getAll: () => transactions,
            
            getCount: () => transactions.length,
            
            add: (tx) => {
                tx.id = nextId++;
                tx.ts = new Date(tx.date).getTime();
                transactions.push(tx);
                save();
                return tx;
            },
            
            delete: (id) => {
                const index = transactions.findIndex(t => t.id === id);
                if (index === -1) return false;
                
                transactions.splice(index, 1);
                save();
                return true;
            },
            
            // Filter, sort and paginate in one pass
            query: (filters, page = 1, pageSize = 30) => {
                // Start with all transactions
                let filtered = transactions;
                
                // Apply search filter
                if (filters.search && filters.search.trim() !== '') {
                    const term = filters.search.toLowerCase().trim();
                    filtered = filtered.filter(t => 
                        (t.n && t.n.toLowerCase().includes(term)) || 
                        (t.c && t.c.toLowerCase().includes(term)) ||
                        (t.p && t.p.toLowerCase().includes(term)) ||
                        (t.ty && t.ty.toLowerCase().includes(term))
                    );
                }
                
                // Apply date range
                if (filters.dateFrom) {
                    const from = new Date(filters.dateFrom).getTime();
                    filtered = filtered.filter(t => t.ts >= from);
                }
                
                if (filters.dateTo) {
                    const to = new Date(filters.dateTo).getTime() + 86400000;
                    filtered = filtered.filter(t => t.ts <= to);
                }
                
                // Apply sorting (create new array to avoid mutating original)
                if (filters.sort === 'date-desc') {
                    filtered = [...filtered].sort((a, b) => b.ts - a.ts);
                } else if (filters.sort === 'date-asc') {
                    filtered = [...filtered].sort((a, b) => a.ts - b.ts);
                } else if (filters.sort === 'amount-desc') {
                    filtered = [...filtered].sort((a, b) => b.a - a.a);
                } else if (filters.sort === 'amount-asc') {
                    filtered = [...filtered].sort((a, b) => a.a - b.a);
                }
                
                // Calculate pagination
                const total = filtered.length;
                const start = (page - 1) * pageSize;
                const paginated = filtered.slice(start, start + pageSize);
                
                return {
                    data: paginated,
                    total: total,
                    page: page,
                    pageSize: pageSize,
                    totalPages: Math.ceil(total / pageSize)
                };
            },
            
            // Calculate KPIs from filtered data
            calculateKPIs: (filteredData) => {
                let totalIncome = 0;
                let totalExpense = 0;
                const now = new Date();
                const currentMonth = now.getMonth();
                const currentYear = now.getFullYear();
                let monthIncome = 0;
                let monthExpense = 0;
                const personExpenses = {};
                
                for (let i = 0; i < filteredData.length; i++) {
                    const t = filteredData[i];
                    
                    if (t.ty === 'income') {
                        totalIncome += t.a;
                        
                        const d = new Date(t.ts);
                        if (d.getMonth() === currentMonth && d.getFullYear() === currentYear) {
                            monthIncome += t.a;
                        }
                    } else {
                        totalExpense += t.a;
                        
                        const d = new Date(t.ts);
                        if (d.getMonth() === currentMonth && d.getFullYear() === currentYear) {
                            monthExpense += t.a;
                        }
                        
                        const person = t.p || 'Self';
                        personExpenses[person] = (personExpenses[person] || 0) + t.a;
                    }
                }
                
                return {
                    totalIncome,
                    totalExpense,
                    balance: totalIncome - totalExpense,
                    monthIncome,
                    monthExpense,
                    monthBalance: monthIncome - monthExpense,
                    personExpenses
                };
            },
            
            // Get category totals for pie chart (from filtered data)
            getCategoryTotals: (filteredData) => {
                const categories = {};
                
                for (let i = 0; i < filteredData.length; i++) {
                    const t = filteredData[i];
                    if (t.ty === 'expense') {
                        categories[t.c] = (categories[t.c] || 0) + t.a;
                    }
                }
                
                return categories;
            },
            
            // Get monthly aggregates for bar chart (last 12 months)
            getMonthlyAggregates: (filteredData) => {
                const now = Date.now();
                const oneYearAgo = now - (365 * 86400000);
                const monthly = {};
                
                for (let i = 0; i < filteredData.length; i++) {
                    const t = filteredData[i];
                    
                    if (t.ts >= oneYearAgo) {
                        const d = new Date(t.ts);
                        const monthKey = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
                        
                        if (!monthly[monthKey]) {
                            monthly[monthKey] = { i: 0, e: 0 };
                        }
                        
                        if (t.ty === 'income') {
                            monthly[monthKey].i += t.a;
                        } else {
                            monthly[monthKey].e += t.a;
                        }
                    }
                }
                
                return monthly;
            }
        };
    })();

    // ------------------------------------------------------------------------
    // UI Manager
    // ------------------------------------------------------------------------
    const UIManager = (function() {
        const elements = {
            totalIncome: document.getElementById('totalIncome'),
            totalExpense: document.getElementById('totalExpense'),
            netBalance: document.getElementById('netBalance'),
            monthlySummary: document.getElementById('monthlySummary'),
            tableBody: document.getElementById('tableBody'),
            emptyPlaceholder: document.getElementById('emptyPlaceholder'),
            addBtn: document.getElementById('addBtn'),
            entryType: document.getElementById('entryType'),
            amount: document.getElementById('amount'),
            category: document.getElementById('category'),
            personSelect: document.getElementById('personSelect'),
            entryDate: document.getElementById('entryDate'),
            note: document.getElementById('note'),
            searchInput: document.getElementById('searchInput'),
            dateFrom: document.getElementById('dateFrom'),
            dateTo: document.getElementById('dateTo'),
            sortSelect: document.getElementById('sortSelect'),
            pagination: document.getElementById('pagination')
        };
        
        let currentPage = 1;
        const pageSize = 30;
        
        // Set today's date
        elements.entryDate.value = new Date().toISOString().split('T')[0];
        
        // Format Indian Rupees
        const formatINR = (num) => {
            return '₹ ' + num.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
        };
        
        // Show toast notification
        const showToast = (msg) => {
            const toast = document.createElement('div');
            toast.className = 'toast-success';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => {
                if (toast.parentNode) toast.remove();
            }, 3000);
        };
        
        // Reset form after add
        const resetForm = () => {
            elements.entryType.value = 'income';
            elements.amount.value = '';
            elements.category.value = 'Salary';
            elements.personSelect.value = 'Self';
            elements.entryDate.value = new Date().toISOString().split('T')[0];
            elements.note.value = '';
        };
        
        // Update KPI cards
        const updateKPI = (kpis) => {
            elements.totalIncome.innerText = formatINR(kpis.totalIncome);
            elements.totalExpense.innerText = formatINR(kpis.totalExpense);
            elements.monthlySummary.innerText = formatINR(kpis.monthBalance);
            
            let personHtml = '<div class="person-breakdown">';
            const persons = kpis.personExpenses;
            
            if (Object.keys(persons).length > 0) {
                for (const [person, amount] of Object.entries(persons)) {
                    personHtml += `<div>${person}: ${formatINR(amount)}</div>`;
                }
            } else {
                personHtml += '<div>No expenses</div>';
            }
            personHtml += '</div>';
            
            elements.netBalance.innerHTML = formatINR(kpis.balance) + personHtml;
        };
        
        // Render table with paginated data
        const renderTable = (result) => {
            if (result.total === 0) {
                elements.tableBody.innerHTML = '';
                elements.emptyPlaceholder.style.display = 'block';
                elements.pagination.innerHTML = '';
                return;
            }
            
            elements.emptyPlaceholder.style.display = 'none';
            
            let html = '';
            for (let i = 0; i < result.data.length; i++) {
                const t = result.data[i];
                const typeClass = t.ty === 'income' ? 'income-badge' : 'expense-badge';
                const sign = t.ty === 'income' ? '' : '-';
                
                html += `<tr>
                    <td class="${typeClass}">${t.ty}</td>
                    <td>${sign}${formatINR(t.a)}</td>
                    <td>${t.c}</td>
                    <td>${t.p || 'Self'}</td>
                    <td>${t.date}</td>
                    <td>${t.n || ''}</td>
                    <td class="entry-actions">
                        <i class="fas fa-trash-alt" data-id="${t.id}" style="color:#b13e4b;" title="Delete"></i>
                    </td>
                </tr>`;
            }
            
            elements.tableBody.innerHTML = html;
            
            // Render pagination
            if (result.totalPages > 1) {
                let paginationHtml = '';
                
                // First page
                paginationHtml += `<button ${result.page === 1 ? 'disabled' : ''} data-page="1">«</button>`;
                
                // Previous page
                paginationHtml += `<button ${result.page === 1 ? 'disabled' : ''} data-page="${result.page - 1}">‹</button>`;
                
                // Page numbers
                const start = Math.max(1, result.page - 2);
                const end = Math.min(result.totalPages, result.page + 2);
                
                for (let i = start; i <= end; i++) {
                    paginationHtml += `<button class="${i === result.page ? 'active' : ''}" data-page="${i}">${i}</button>`;
                }
                
                // Next page
                paginationHtml += `<button ${result.page === result.totalPages ? 'disabled' : ''} data-page="${result.page + 1}">›</button>`;
                
                // Last page
                paginationHtml += `<button ${result.page === result.totalPages ? 'disabled' : ''} data-page="${result.totalPages}">»</button>`;
                
                elements.pagination.innerHTML = paginationHtml;
            } else {
                elements.pagination.innerHTML = '';
            }
        };
        
        // Get current filter values
        const getFilters = () => ({
            search: elements.searchInput.value,
            dateFrom: elements.dateFrom.value,
            dateTo: elements.dateTo.value,
            sort: elements.sortSelect.value
        });
        
        return {
            elements,
            formatINR,
            showToast,
            resetForm,
            updateKPI,
            renderTable,
            getFilters,
            currentPage: () => currentPage,
            setPage: (p) => { currentPage = p; }
        };
    })();

    // ------------------------------------------------------------------------
    // Chart Manager - With Perfect Pie Chart
    // ------------------------------------------------------------------------
    const ChartManager = (function() {
        const charts = {
            bar: null,
            pie: null,
            line: null
        };
        
        const elements = {
            bar: document.getElementById('barChart'),
            pie: document.getElementById('pieChart'),
            line: document.getElementById('lineChart')
        };
        
        let updateTimeout;
        
        const update = (filteredData) => {
            if (updateTimeout) cancelAnimationFrame(updateTimeout);
            updateTimeout = requestAnimationFrame(() => {
                performUpdate(filteredData);
            });
        };
        
        const performUpdate = (filteredData) => {
            // BAR CHART - Monthly trend (last 12 months)
            if (elements.bar) {
                const monthly = DataStore.getMonthlyAggregates(filteredData);
                const sortedMonths = Object.keys(monthly).sort().slice(-12);
                
                const labels = sortedMonths.map(m => {
                    const [year, month] = m.split('-');
                    return month + '/' + year.slice(2);
                });
                
                const incomeData = sortedMonths.map(m => monthly[m].i || 0);
                const expenseData = sortedMonths.map(m => monthly[m].e || 0);
                
                if (charts.bar) {
                    charts.bar.data.labels = labels;
                    charts.bar.data.datasets[0].data = incomeData;
                    charts.bar.data.datasets[1].data = expenseData;
                    charts.bar.update('none');
                } else {
                    charts.bar = new Chart(elements.bar, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [
                                { label: 'Income', data: incomeData, backgroundColor: '#2a3f8a', borderRadius: 6 },
                                { label: 'Expense', data: expenseData, backgroundColor: '#b13e4b', borderRadius: 6 }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            animation: false,
                            plugins: { legend: { display: false } }
                        }
                    });
                }
            }
            
            // PIE CHART - All categories from filtered data
            if (elements.pie) {
                const categories = DataStore.getCategoryTotals(filteredData);
                const labels = Object.keys(categories);
                const data = Object.values(categories);
                
                // Generate colors for each category
                ColorGenerator.reset();
                const colors = labels.map(l => ColorGenerator.getColor(l));
                
                if (charts.pie) {
                    charts.pie.data.labels = labels;
                    charts.pie.data.datasets[0].data = data;
                    charts.pie.data.datasets[0].backgroundColor = colors;
                    charts.pie.update('none');
                } else {
                    charts.pie = new Chart(elements.pie, {
                        type: 'pie',
                        data: {
                            labels: labels,
                            datasets: [{
                                data: data,
                                backgroundColor: colors,
                                borderWidth: 0
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            animation: false,
                            plugins: {
                                legend: { position: 'bottom' }
                            }
                        }
                    });
                }
            }
            
            // LINE CHART - Simplified
            if (elements.line) {
                if (!charts.line) {
                    charts.line = new Chart(elements.line, {
                        type: 'line',
                        data: {
                            datasets: [{
                                label: 'Net Balance',
                                data: [{ x: new Date().toISOString().split('T')[0], y: 0 }],
                                borderColor: '#2a3f8a',
                                tension: 0.2
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            animation: false
                        }
                    });
                }
            }
        };
        
        return { update };
    })();

    // ------------------------------------------------------------------------
    // App Controller - Main Orchestrator
    // ------------------------------------------------------------------------
    const App = (function() {
        let filterTimeout;
        
        // Main refresh function
        const refresh = (page = UIManager.currentPage()) => {
            const filters = UIManager.getFilters();
            const result = DataStore.query(filters, page, 30);
            
            // Update table
            UIManager.renderTable(result);
            
            // Calculate KPIs from filtered data (all filtered, not just page)
            const allFiltered = DataStore.query(filters, 1, 1000000).data;
            const kpis = DataStore.calculateKPIs(allFiltered);
            UIManager.updateKPI(kpis);
            
            // Update charts with filtered data
            ChartManager.update(allFiltered);
        };
        
        // Debounced refresh for search
        const debouncedRefresh = () => {
            if (filterTimeout) clearTimeout(filterTimeout);
            filterTimeout = setTimeout(() => {
                UIManager.setPage(1);
                refresh(1);
            }, 300);
        };
        
        // Handle add transaction
        const handleAdd = () => {
            const amount = parseFloat(UIManager.elements.amount.value);
            
            if (!amount || amount <= 0) {
                alert('Please enter a positive amount');
                return;
            }
            
            DataStore.add({
                ty: UIManager.elements.entryType.value,
                a: amount,
                c: UIManager.elements.category.value,
                p: UIManager.elements.personSelect.value,
                date: UIManager.elements.entryDate.value,
                n: UIManager.elements.note.value
            });
            
            UIManager.showToast('Entry added successfully');
            UIManager.resetForm();
            
            // Refresh to first page
            UIManager.setPage(1);
            refresh(1);
        };
        
        // Handle delete
        const handleDelete = (id) => {
            if (confirm('Delete this transaction? This action cannot be undone.')) {
                DataStore.delete(id);
                UIManager.showToast('Entry deleted');
                
                // Refresh current page
                refresh(UIManager.currentPage());
            }
        };
        
        // Initialize event listeners
        const initEventListeners = () => {
            // Add button
            UIManager.elements.addBtn.addEventListener('click', handleAdd);
            
            // Filter inputs
            UIManager.elements.searchInput.addEventListener('input', debouncedRefresh);
            UIManager.elements.dateFrom.addEventListener('change', () => {
                UIManager.setPage(1);
                refresh(1);
            });
            UIManager.elements.dateTo.addEventListener('change', () => {
                UIManager.setPage(1);
                refresh(1);
            });
            UIManager.elements.sortSelect.addEventListener('change', () => {
                UIManager.setPage(1);
                refresh(1);
            });
            
            // Table actions delegation (delete only)
            UIManager.elements.tableBody.addEventListener('click', (e) => {
                const target = e.target;
                if (target.classList.contains('fa-trash-alt')) {
                    const id = parseInt(target.dataset.id);
                    handleDelete(id);
                }
            });
            
            // Pagination
            UIManager.elements.pagination.addEventListener('click', (e) => {
                if (e.target.tagName === 'BUTTON' && e.target.dataset.page && !e.target.disabled) {
                    const page = parseInt(e.target.dataset.page);
                    UIManager.setPage(page);
                    refresh(page);
                }
            });
            
            // Export buttons
            document.getElementById('exportPdf').addEventListener('click', () => {
                const count = DataStore.getCount();
                alert(`PDF Export - ${count} transactions\n\nThis would generate a PDF report with all transactions.`);
            });
            
            document.getElementById('exportExcel').addEventListener('click', () => {
                const count = DataStore.getCount();
                alert(`Excel Export - ${count} transactions\n\nThis would generate an Excel file with all data.`);
            });
            
            // Dark mode toggle
            document.getElementById('darkmodeToggle').addEventListener('click', () => {
                document.body.classList.toggle('dark');
                const toggle = document.getElementById('darkmodeToggle');
                toggle.innerHTML = document.body.classList.contains('dark') ? 
                    '<i class="fas fa-sun"></i> LIGHT' : 
                    '<i class="fas fa-moon"></i> LUX';
            });
        };
        
        // Initialize with sample data if empty
        const initSampleData = () => {
            if (DataStore.getCount() === 0) {
                const categories = ['Salary', 'Food', 'Transport', 'Bills', 'Shopping', 'Entertainment', 'Healthcare', 'Education', 'Rent', 'Other'];
                const persons = ['Self', 'Father', 'Mother', 'Brother'];
                const types = ['income', 'expense'];
                
                for (let i = 0; i < 100; i++) {
                    const date = new Date(2024, Math.floor(Math.random() * 12), 1 + Math.floor(Math.random() * 28));
                    DataStore.add({
                        ty: types[Math.floor(Math.random() * 2)],
                        a: Math.floor(Math.random() * 5000) + 500,
                        c: categories[Math.floor(Math.random() * categories.length)],
                        p: persons[Math.floor(Math.random() * persons.length)],
                        date: date.toISOString().split('T')[0],
                        n: 'Sample ' + (i + 1)
                    });
                }
            }
        };
        
        // Public API
        return {
            init: () => {
                DataStore.init();
                initSampleData();
                initEventListeners();
                refresh(1);
            }
        };
    })();

    // Start the application
    App.init();
})();
</script>
</body>
</html>
